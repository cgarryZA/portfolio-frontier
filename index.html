<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CS2 Portfolio Efficient Frontier</title>
<link rel="stylesheet" href="./style.css" />
<script type="module" src="./frontier.js"></script>
</head>
<body>
  <header>
    <div class="title">CS2 Portfolio Efficient Frontier</div>
    <div class="subtitle">Mean-Variance Optimization Across All Tradeable Items</div>
  </header>
  <div class="container">
    <div class="grid" style="margin-bottom:16px;">
      <section class="card" id="frontier-card">
        <h2>Efficient Frontier</h2>
        <canvas id="frontier-canvas" style="width:100%;height:420px;"></canvas>
      </section>
      <section class="card" id="scatter-card">
        <h2>Item Risk-Return Scatter</h2>
        <div id="scatter-legend" style="margin-bottom:8px;"></div>
        <canvas id="scatter-canvas" style="width:100%;height:420px;"></canvas>
      </section>
    </div>

    <section class="card" id="stats-card">
      <h2>Special Portfolios</h2>
      <div id="special-portfolios"></div>
    </section>

    <section class="card" id="index-card">
      <h2>Index Portfolios</h2>
      <p style="color:var(--muted);font-size:13px;margin:0 0 12px;">Max-Sharpe portfolio constrained to items within each sector/index.</p>
      <div id="index-portfolios"></div>
    </section>

    <section class="card" id="correlation-card">
      <h2>Sector Correlation</h2>
      <div id="sector-corr"></div>
    </section>

    <section class="card" id="table-card">
      <h2>Item Statistics</h2>
      <div style="margin-bottom:8px;">
        <input id="search" type="text" placeholder="Search items..."
          style="padding:6px 12px;border-radius:8px;border:1px solid var(--grid);
                 background:rgba(255,255,255,0.05);color:var(--ink);font-size:13px;width:260px;" />
        <select id="type-filter"
          style="padding:6px 12px;border-radius:8px;border:1px solid var(--grid);
                 background:rgba(255,255,255,0.05);color:var(--ink);font-size:13px;margin-left:8px;">
          <option value="all">All Types</option>
        </select>
        <select id="sort-by"
          style="padding:6px 12px;border-radius:8px;border:1px solid var(--grid);
                 background:rgba(255,255,255,0.05);color:var(--ink);font-size:13px;margin-left:8px;">
          <option value="sharpe">Sort: Sharpe</option>
          <option value="vol">Sort: Volatility</option>
          <option value="mean_ret">Sort: Return</option>
          <option value="max_dd">Sort: Max DD</option>
          <option value="last_price">Sort: Price</option>
        </select>
      </div>
      <div id="item-table" style="overflow-x:auto;"></div>
    </section>

    <section class="card" id="metadata-card">
      <h2>Dataset Info</h2>
      <div id="metadata"></div>
    </section>
  </div>
</body>
</html>
